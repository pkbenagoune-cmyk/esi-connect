<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Event Delegation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-8 max-w-md mx-auto">

    <h1 class="text-2xl font-bold">🛒 Ma liste de courses</h1>

    <div class="mt-4 flex gap-2">
        <input id="newItem" type="text" placeholder="Ajouter un article..."
            class="border border-slate-300 rounded-lg px-3 py-2 flex-1">
        <button id="addBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Ajouter</button>
    </div>

    <ul id="list" class="mt-6 space-y-2"></ul>

    <script>
        let items = [
            { id: 1, nom: "Pain", achete: false },
            { id: 2, nom: "Lait", achete: true },
            { id: 3, nom: "Tomates", achete: false }
        ];
        function render() {
            list.innerHTML = "";
            items.forEach(item => {
                list.innerHTML += `
     <li class="bg-white rounded-lg shadow px-4 py-3 flex items-center justify-between">
  <span class="${item.achete ? "line-through text-slate-400" : ""}">${item.nom}</span>
  <div class="flex gap-2">
    <button data-action="toggle" data-id="${item.id}" class="text-green-600">✔</button>
    <button data-action="delete" data-id="${item.id}" class="text-red-500 font-bold">✕</button>
  </div>
</li> `
                    ;

            });


        }
        render();

        list.addEventListener("click", (event) => {
            const btn = event.target.closest(".deleteBtn");
            if (!btn) return;
            const id = Number(btn.dataset.id);       // les data-* sont des strings !
            items = items.filter(item => item.id !== id);
            render();
        });


    </script>
</body>

</html>
